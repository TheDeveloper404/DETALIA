# SEC-A4 — Dependabot: PR-uri automate pentru dependențe vulnerabile/învechite (npm).
# Security updates le deschide imediat ce apare un advisory; version updates — săptămânal, grupate,
# ca să nu inunde repo-ul cu PR-uri mărunte. Merge-ul rămâne manual (CI: type-check + lint + build).
version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    target-branch: "dev"
    open-pull-requests-limit: 5
    groups:
      minor-and-patch:
        update-types: ["minor", "patch"]
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    target-branch: "dev"
