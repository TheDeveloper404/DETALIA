name: DB backup (production)

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch: {}

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - name: Install postgresql-client 18
        # Format deb822 (.sources), cel documentat oficial acum de postgresql.org/download/linux/ubuntu —
        # NU vechiul format pe o linie (.list) care a picat data trecută (paranteze lipsă la signed-by).
        run: |
          sudo apt-get update
          sudo apt-get install -y curl ca-certificates gnupg postgresql-common
          sudo install -d /usr/share/postgresql-common/pgdg
          sudo curl -o /usr/share/postgresql-common/pgdg/apt.postgresql.org.asc --fail https://www.postgresql.org/media/keys/ACCC4CF8.asc
          CODENAME=$(. /etc/os-release && echo "$VERSION_CODENAME")
          {
            echo "Types: deb"
            echo "URIs: https://apt.postgresql.org/pub/repos/apt"
            echo "Suites: ${CODENAME}-pgdg"
            echo "Components: main"
            echo "Signed-By: /usr/share/postgresql-common/pgdg/apt.postgresql.org.asc"
          } | sudo tee /etc/apt/sources.list.d/pgdg.sources
          sudo apt-get update
          sudo apt-get install -y postgresql-client-18

      - name: Dump production
        env:
          DATABASE_URL: ${{ secrets.PROD_DATABASE_URL_BACKUP }}
        # Ubuntu are implicit pg_dump v16 în PATH; server-ul e Postgres 18 — folosim binarul v18 explicit
        # (postgresql-client-18 nu se pune primul în PATH la instalare).
        run: /usr/lib/postgresql/18/bin/pg_dump "$DATABASE_URL" --format=custom --file=production-backup.dump

      - name: Upload backup artifact
        uses: actions/upload-artifact@v4
        with:
          name: production-backup-${{ github.run_id }}
          path: production-backup.dump
          retention-days: 30
