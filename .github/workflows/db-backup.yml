name: DB backup (production)

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch: {}

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - name: Install postgresql-client 18
        run: |
          sudo apt-get update
          sudo apt-get install -y curl ca-certificates gnupg
          sudo install -d /usr/share/postgresql-common/pgdg
          sudo curl -o /usr/share/postgresql-common/pgdg/apt.postgresql.org.asc --fail https://www.postgresql.org/media/keys/ACCC4CF8.asc
          echo "deb signed-by=/usr/share/postgresql-common/pgdg/apt.postgresql.org.asc https://apt.postgresql.org/pub/repos/apt $(. /etc/os-release && echo $VERSION_CODENAME)-pgdg main" | sudo tee /etc/apt/sources.list.d/pgdg.list
          sudo apt-get update
          sudo apt-get install -y postgresql-client-18

      - name: Dump production
        env:
          DATABASE_URL: ${{ secrets.PROD_DATABASE_URL_BACKUP }}
        run: pg_dump "$DATABASE_URL" --format=custom --file=production-backup.dump

      - name: Upload backup artifact
        uses: actions/upload-artifact@v4
        with:
          name: production-backup-${{ github.run_id }}
          path: production-backup.dump
          retention-days: 30
