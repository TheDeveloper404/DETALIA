name: CI

# Verifica build verde la fiecare push SI PR pe dev / main: type-check + lint + build.
# Teste verzi nu inseamna build verde - vitest ignora erorile de tip; aici prindem ce pica la deploy.
# Pre-scaffold (fara package.json) ruleaza gol si trece - devine activ automat dupa Faza 0.

on:
  push:
    branches: [dev, main]
  pull_request:
    branches: [dev, main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detectează proiect scaffold-at
        id: detect
        run: |
          if [ -f package.json ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Node
        if: steps.detect.outputs.ready == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        if: steps.detect.outputs.ready == 'true'
        run: npm ci

      - name: Type-check
        if: steps.detect.outputs.ready == 'true'
        run: npm run typecheck --if-present

      - name: Lint
        if: steps.detect.outputs.ready == 'true'
        run: npm run lint --if-present

      - name: Build
        if: steps.detect.outputs.ready == 'true'
        run: npm run build --if-present

      - name: Pre-scaffold (skip)
        if: steps.detect.outputs.ready == 'false'
        run: echo "Pre-scaffold - inca nu exista package.json. CI trece gol; devine activ dupa Faza 0."
