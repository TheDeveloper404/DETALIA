name: CI

# Verifica la fiecare push SI PR pe dev / main: secret scan (gitleaks) + npm audit (high/critical)
# + type-check + lint + test (vitest) + build.
# Teste verzi nu inseamna build verde - vitest ignora erorile de tip; build-ul prinde ce pica la deploy.
# Testele = unit/domain/securitate (repo-uri mock, fara DB/secrete). E2E NU ruleaza in CI (cere preview + bypass).
# Pre-scaffold (fara package.json) ruleaza gol si trece - devine activ automat dupa Faza 0.

on:
  push:
    branches: [dev, main]
  pull_request:
    branches: [dev, main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          # Istoric complet → secret scanning vede toate commit-urile, nu doar HEAD.
          fetch-depth: 0

      # Scanare de secrete pe tot istoricul + diff-ul PR-ului (SEC-10). Ar fi prins tokenul
      # de sesiune comis în e2e/.auth/. Licență cerută DOAR pe conturi de organizație; pe cont
      # personal rulează liber. Rulează indiferent de scaffold (fișierele există mereu).
      - name: Secret scan (gitleaks)
        uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Detectează proiect scaffold-at
        id: detect
        run: |
          if [ -f package.json ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Node
        if: steps.detect.outputs.ready == 'true'
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - name: Install
        if: steps.detect.outputs.ready == 'true'
        run: npm ci

      # Fail DOAR pe high/critical → cele 6 moderate (postcss/esbuild) rămân risk-acceptance MVP,
      # dar orice vulnerabilitate nouă high/critical blochează PR-ul.
      - name: Audit dependențe
        if: steps.detect.outputs.ready == 'true'
        run: npm audit --audit-level=high

      - name: Type-check
        if: steps.detect.outputs.ready == 'true'
        run: npm run typecheck --if-present

      - name: Lint
        if: steps.detect.outputs.ready == 'true'
        run: npm run lint --if-present

      - name: Test (vitest — unit/domain/securitate)
        if: steps.detect.outputs.ready == 'true'
        run: npm run test --if-present

      - name: Build
        if: steps.detect.outputs.ready == 'true'
        run: npm run build --if-present

      - name: Pre-scaffold (skip)
        if: steps.detect.outputs.ready == 'false'
        run: echo "Pre-scaffold - inca nu exista package.json. CI trece gol; devine activ dupa Faza 0."
